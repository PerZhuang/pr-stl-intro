<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR AI-STL 小组介绍</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #00ff41;
    font-family: 'Courier New', 'SimHei', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  /* ── Canvas layers ── */
  #matrix-canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; }
  #fx-canvas     { position:fixed; top:0; left:0; width:100%; height:100%; z-index:8; pointer-events:none; }

  /* ── Scanline sweep ── */
  #scanline {
    position:fixed; top:-3px; left:0; width:100%; height:3px;
    background:linear-gradient(90deg,transparent 0%,rgba(255,140,60,.15) 10%,
      rgba(255,140,60,.85) 50%,rgba(255,140,60,.15) 90%,transparent 100%);
    box-shadow:0 0 18px rgba(255,140,60,.7),0 0 40px rgba(255,100,20,.3);
    z-index:25; pointer-events:none; animation:scanDown 9s linear infinite;
  }
  @keyframes scanDown {
    0%{top:-3px;opacity:0} 4%{opacity:1} 96%{opacity:.8} 100%{top:100vh;opacity:0}
  }

  /* ── CRT scanlines overlay ── */
  body::after {
    content:''; position:fixed; top:0; left:0; width:100%; height:100%;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);
    z-index:30; pointer-events:none;
  }

  /* ── Joi character image ── */
  #joi-img {
    position: fixed;
    left: 0;
    top: 0;
    width: 56vw;
    height: 100vh;
    object-fit: cover;
    object-position: left center;
    z-index: 12;
    pointer-events: none;
    mix-blend-mode: screen;
    opacity: 0.92;
    /* fade out right edge (background) and top/bottom edges */
    -webkit-mask-image:
      linear-gradient(to right,
        black    0%,
        black   52%,
        rgba(0,0,0,.55) 68%,
        transparent 84%),
      linear-gradient(to bottom,
        transparent  0%,
        black        6%,
        black       92%,
        transparent 100%);
    -webkit-mask-composite: source-in;
    mask-image:
      linear-gradient(to right,
        black    0%,
        black   52%,
        rgba(0,0,0,.55) 68%,
        transparent 84%),
      linear-gradient(to bottom,
        transparent  0%,
        black        6%,
        black       92%,
        transparent 100%);
    mask-composite: intersect;
    /* subtle float animation */
    animation: joiFloat 7s ease-in-out infinite;
    filter: saturate(1.15) brightness(1.05);
  }
  @keyframes joiFloat {
    0%,100% { transform: translateY(0px) scale(1); }
    50%     { transform: translateY(-8px) scale(1.008); }
  }

  /* ── Content area ── */
  #content {
    position:relative; z-index:10; width:100%; height:100%;
    display:flex; flex-direction:column;
    justify-content:flex-start; align-items:center;
    padding: 60px 80px 60px 50vw;
    overflow-y:auto; overflow-x:hidden;
  }
  .terminal-block {
    width:100%; max-width:900px;
    display:flex; flex-direction:column; align-items:center;
  }

  /* ── Line styles ── */
  .line {
    font-size:28px; line-height:1.85; color:#00ff41; white-space:pre-wrap;
    opacity:0; text-shadow:0 0 8px #00ff41;
    min-height:1.85em; text-align:center; width:100%;
  }
  .line.prompt   { color:#00aa22; font-size:22px; text-align:left; }
  .line.highlight{ color:#aaffaa; font-size:32px; font-weight:bold;
    text-shadow:0 0 16px #00ff41,0 0 32px #00ff41; text-align:center; }
  .line.dim      { color:#005510; font-size:20px; letter-spacing:2px; text-align:center; }
  .line.section  { color:#00dd33; font-size:20px; font-style:italic;
    text-align:center; text-shadow:0 0 10px #00ff41; }
  .line.case     { color:#00ee44; font-size:22px; text-align:left; padding-left:20px; }
  .line.ending   { color:#00ff41; font-size:32px; font-weight:bold;
    text-shadow:0 0 20px #00ff41,0 0 40px #00ff41; text-align:center; }
  .line.status   { color:#00ff41; font-size:22px; text-align:center;
    letter-spacing:3px; text-shadow:0 0 12px #00ff41; }

  @keyframes rgbGlitch {
    0%,100%{text-shadow:0 0 8px #00ff41;transform:none}
    15%{text-shadow:-3px 0 rgba(255,0,120,.85),3px 0 rgba(0,180,255,.85),0 0 8px #00ff41;transform:translate(2px,0)}
    35%{text-shadow:3px 0 rgba(255,0,120,.6),-2px 0 rgba(0,180,255,.6),0 0 8px #00ff41;transform:translate(-2px,0)}
    55%{text-shadow:-1px 0 rgba(255,0,120,.4),0 0 8px #00ff41;transform:translate(1px,0)}
    80%{text-shadow:0 0 8px #00ff41;transform:none}
  }
  .line.glitch-anim{animation:rgbGlitch .2s steps(3) 2}
  .cursor{display:inline-block;width:16px;height:28px;background:#00ff41;vertical-align:middle;
    animation:blink .7s step-end infinite;box-shadow:0 0 8px #00ff41}
  @keyframes blink{50%{opacity:0}}
</style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>
<canvas id="fx-canvas"></canvas>
<div id="scanline"></div>

<!-- Joi — mix-blend-mode:screen makes dark bg transparent, neon character floats -->
<img id="joi-img" src="joi.jpg" alt="">

<div id="content">
  <div class="terminal-block" id="terminal"></div>
</div>

<script>
// ══════════════════════════════════════════════
// 1. MATRIX RAIN
// ══════════════════════════════════════════════
const matCanvas = document.getElementById('matrix-canvas');
const mctx = matCanvas.getContext('2d');
matCanvas.width = window.innerWidth; matCanvas.height = window.innerHeight;
const CHARS = '\u7684\u4e86\u662f\u5728\u548c\u6709\u5927\u8fd9\u56fd\u7ecf\u8981\u4eba\u5b9e\u73b0\u6570\u636e\u7b97\u6cd5\u5206\u6790\u8206\u60c5\u5185\u5bb9\u4f20\u64ad\u8fd0\u884c\u667a\u80fd\u534f\u4f5c01\u30a2\u30a4\u30a6\u30ab\u03a9\u2211\u03bb\u2592\u2593';
const FS = 17, COLS = Math.floor(matCanvas.width / FS);
const streams = Array.from({length:COLS}, () => ({
  y: Math.random() * matCanvas.height / FS,
  speed: .35 + Math.random() * .9,
  hue: Math.random() < .07 ? (Math.random() < .5 ? 'orange' : 'blue') : 'green',
  bright: Math.random() > .82
}));
let burstCol = -1;
setInterval(() => { burstCol = Math.floor(Math.random() * COLS); }, 1100);
function drawMatrix() {
  mctx.fillStyle = 'rgba(0,0,0,0.05)'; mctx.fillRect(0,0,matCanvas.width,matCanvas.height);
  mctx.font = FS + 'px monospace';
  streams.forEach((s,i) => {
    const ch = CHARS[Math.floor(Math.random() * CHARS.length)], burst = i === burstCol;
    let color, alpha;
    if (s.hue==='orange')    {color='#ff8c42';alpha=burst?.55:(s.bright?.32:.19);}
    else if (s.hue==='blue') {color='#44aaff';alpha=burst?.50:(s.bright?.28:.17);}
    else                     {color='#00ff41';alpha=burst?.60:(s.bright?.26:.17);}
    mctx.globalAlpha=alpha; mctx.fillStyle=color;
    mctx.fillText(ch, i*FS, s.y*FS); mctx.globalAlpha=1;
    s.y += s.speed;
    if (s.y*FS > matCanvas.height && Math.random() > .975) {
      s.y=0; s.hue=Math.random()<.07?(Math.random()<.5?'orange':'blue'):'green'; s.bright=Math.random()>.82;
    }
  });
}
setInterval(drawMatrix, 40);

// ══════════════════════════════════════════════
// 2. FX CANVAS — ripples & particles
// ══════════════════════════════════════════════
const fxCanvas = document.getElementById('fx-canvas');
const fx = fxCanvas.getContext('2d');
fxCanvas.width = window.innerWidth; fxCanvas.height = window.innerHeight;
const ripples=[], particles=[];

class Ripple {
  constructor(x,y){ this.x=x;this.y=y;this.life=1;
    this.rings=[{r:0,speed:4.2,rgba:'255,140,60',lw:2},{r:0,speed:2.5,rgba:'200,80,255',lw:1.4},{r:0,speed:1.4,rgba:'0,255,100',lw:1}]; }
  update(){ this.life-=.016; this.rings.forEach(r=>r.r+=r.speed); }
  draw(){ this.rings.forEach(ring=>{
    const a=this.life*Math.max(0,1-ring.r/220); if(a<=0)return;
    fx.beginPath(); fx.arc(this.x,this.y,ring.r,0,Math.PI*2);
    fx.strokeStyle=`rgba(${ring.rgba},${a.toFixed(3)})`; fx.lineWidth=ring.lw;
    fx.shadowBlur=12; fx.shadowColor=`rgba(${ring.rgba},.5)`; fx.stroke(); fx.shadowBlur=0;
  }); }
  get dead(){ return this.life<=0; }
}
class Particle {
  constructor(x,y){ const a=Math.random()*Math.PI*2,s=1.8+Math.random()*4.5;
    this.x=x;this.y=y;this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s;
    this.life=.8+Math.random()*.4; this.size=1.2+Math.random()*3;
    const r=Math.random(); this.color=r<.45?'#ff66cc':r<.75?'#aa44ff':'#00ff88'; }
  update(){ this.x+=this.vx;this.y+=this.vy;this.vy+=.07;this.vx*=.98;this.life-=.022;this.size*=.974; }
  draw(){ fx.save();fx.globalAlpha=Math.max(0,this.life);fx.shadowBlur=10;fx.shadowColor=this.color;
    fx.fillStyle=this.color;fx.beginPath();fx.arc(this.x,this.y,Math.max(0,this.size),0,Math.PI*2);fx.fill();fx.restore(); }
  get dead(){ return this.life<=0||this.size<.15; }
}
(function fxLoop(){
  fx.clearRect(0,0,fxCanvas.width,fxCanvas.height);
  for(let i=ripples.length-1;i>=0;i--){ripples[i].update();ripples[i].draw();if(ripples[i].dead)ripples.splice(i,1);}
  for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].dead)particles.splice(i,1);}
  requestAnimationFrame(fxLoop);
})();

// ══════════════════════════════════════════════
// 3. CLICK INTERACTION
// ══════════════════════════════════════════════
document.addEventListener('click', e => {
  ripples.push(new Ripple(e.clientX, e.clientY));
  for(let i=0;i<22;i++) particles.push(new Particle(e.clientX, e.clientY));
  document.querySelectorAll('.line').forEach(el => {
    const r = el.getBoundingClientRect();
    if(Math.abs((r.top+r.bottom)/2 - e.clientY) < 120){
      el.classList.add('glitch-anim');
      el.addEventListener('animationend',()=>el.classList.remove('glitch-anim'),{once:true});
    }
  });
});

// ══════════════════════════════════════════════
// 4. PERIODIC AUTO-GLITCH
// ══════════════════════════════════════════════
(function autoGlitch(){
  const vis=Array.from(document.querySelectorAll('.line')).filter(el=>parseFloat(el.style.opacity)>0);
  if(vis.length){const t=vis[Math.floor(Math.random()*vis.length)];
    t.classList.add('glitch-anim');
    t.addEventListener('animationend',()=>t.classList.remove('glitch-anim'),{once:true});}
  setTimeout(autoGlitch,2800+Math.random()*4200);
})();

// ══════════════════════════════════════════════
// 5. AMBIENT FLICKER
// ══════════════════════════════════════════════
(function flicker(){
  matCanvas.style.opacity=(.16+Math.random()*.08).toFixed(3);
  setTimeout(flicker,80+Math.random()*320);
})();

// ══════════════════════════════════════════════
// 6. SCRIPT ENGINE  (auto-scroll fixed)
// ══════════════════════════════════════════════
const content  = document.getElementById('content');
const terminal = document.getElementById('terminal');
const script=[
  {type:'prompt',   text:'> \u6b63\u5728\u521d\u59cb\u5316 PR AI-STL \u534f\u4f5c\u7cfb\u7edf...',speed:28},
  {type:'dim',      text:'\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500',speed:6},
  {type:'blank'},
  {type:'normal',   text:'\u5728 PR \u5de5\u4f5c\u7684\u6bcf\u4e2a\u73af\u8282\uff0c',speed:55},
  {type:'highlight',text:'AI \u6b63\u5728\u6210\u4e3a\u65b0\u7684\u534f\u4f5c\u4f19\u4f34\u3002',speed:65},
  {type:'blank'},
  {type:'normal',   text:'PR AI-STL \u5c0f\u7ec4\uff0c',speed:55},
  {type:'normal',   text:'\u662f\u4e00\u652f\u6765\u81ea\u8206\u60c5\u3001\u5185\u5bb9\u3001BP\u3001\u5a92\u4ecb\u5404\u6761\u7ebf\u7684',speed:40},
  {type:'highlight',text:'\u8de8\u6a21\u5757\u7684\u865a\u62df\u56e2\u961f\u3002',speed:65},
  {type:'blank'},
  {type:'normal',   text:'\u6211\u4eec\u4ee5\u201c\u6700\u5c0f\u5316\u201d\u539f\u5219\u8fd0\u884c\uff0c',speed:50},
  {type:'normal',   text:'\u4e0d\u5f00\u4f1a\u3001\u4e0d\u586b\u8868\uff0c\u53ea\u505a\u4e00\u4ef6\u4e8b\u2014\u2014',speed:50},
  {type:'highlight',text:'\u628a AI \u5de5\u5177\u771f\u6b63\u7528\u8d77\u6765\uff0c',speed:60},
  {type:'normal',   text:'\u63a2\u7d22\u4eba + Agent \u5bf9\u5de5\u4f5c\u6d41\u7a0b\u7684\u6539\u53d8\uff0c',speed:40},
  {type:'normal',   text:'\u5e2e PR \u7684\u6bcf\u4e00\u9879\u5de5\u4f5c\u53d8\u5f97\u66f4\u5feb\u3001\u66f4\u6709\u529b\u3002',speed:40},
  {type:'blank'},
  {type:'dim',      text:'\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500',speed:6},
  {type:'section',  text:'// \u5f53\u4e2d\u6587\u6210\u4e3a\u65b0\u7684\u7f16\u7a0b\u8bed\u8a00',speed:35,delay:300},
  {type:'section',  text:'// \u8fd9\u662f\u6211\u4eec\u7684\u673a\u4f1a\uff0c\u4e5f\u662f\u6211\u4eec\u7684\u65b0\u8d77\u70b9\u3002',speed:35},
  {type:'blank',    delay:1000},
  {type:'prompt',   text:'> \u4e0a\u7ebf\u5de5\u5177\uff08\u542b\u5f00\u53d1\u4e2d\uff09\u2193',speed:32,delay:200},
  {type:'blank'},
  {type:'case',text:'[ \u8206\u60c5\u6a21\u5757 ]   AI \u6570\u636e\u63a5\u53e3 + \u867e\u81ea\u52a8\u8c03\u53d6\uff0c\u8bae\u9898\u8ffd\u8e2a\u63d0\u901f',speed:22},
  {type:'case',text:'[ \u5185\u5bb9\u6a21\u5757 ]   \u901a\u7a3f Agent\u3001\u5ba1\u6821 Agent \u5f00\u53d1\u4e2d\uff0c\u81ea\u52a8\u5316\u4f5c\u4e1a',speed:22},
  {type:'case',text:'[ \u5185\u5bb9\u6a21\u5757 ]   \u7406\u8bba\u7a3f Bot \u9648\u4f2f\u8fbe\u5df2\u4e0a\u7ebf\uff0c\u751f\u4ea7\u6548\u7387\u663e\u8457\u63d0\u5347',speed:22},
  {type:'case',text:'[ \u65b0\u5a92\u4f53\u6a21\u5757 ] \u53e3\u64ad\u53f7\u5c0f\u738b\u5b50\uff0c\u65b0\u5a92\u4f53\u5206\u53d1\u5185\u5bb9\u81ea\u52a8\u62c6\u5206',speed:22},
  {type:'case',text:'[ BP \u6a21\u5757    ] Agent \u5168\u6d41\u7a0b\u8f85\u52a9\uff0c\u70ed\u70b9\u8ffd\u8e2a & \u9009\u9898\u7b56\u5212',speed:22},
  {type:'blank'},
  {type:'dim',      text:'\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500',speed:6},
  {type:'blank',    delay:800},
  {type:'prompt',   text:'> \u6211\u4eec\u7684\u76ee\u6807',speed:45,delay:300},
  {type:'blank'},
  {type:'ending',   text:'\u6240\u6709\u7684\u5de5\u4f5c\uff0c\u60f3\u60f3\u7528 AI \u600e\u4e48\u505a\u3002',speed:65},
  {type:'ending',   text:'\u52c7\u4e8e\u63a2\u7d22\uff0c\u52c7\u4e8e\u8bd5\u9519\u3002',speed:65,delay:200},
  {type:'ending',   text:'\u5e2e\u66f4\u591a\u4eba\u7528\u597d AI\u3002',speed:65,delay:200},
  {type:'ending',   text:'\u505a\u539f\u751f\u7684 AI-PR\u3002',speed:65,delay:200},
  {type:'blank',    delay:700},
  {type:'status',   text:'// STATUS: ONLINE  \u2713',speed:38,delay:400},
];

async function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
async function runScript(){
  await sleep(700);
  for(let i=0;i<script.length;i++){
    const item=script[i], isLast=i===script.length-1;
    if(item.delay) await sleep(item.delay);
    if(item.type==='blank'){
      const b=document.createElement('div');
      b.className='line dim'; b.style.opacity='1'; b.style.minHeight='1em';
      terminal.appendChild(b);
      content.scrollTop=content.scrollHeight;
      await sleep(160); continue;
    }
    const lineEl=document.createElement('div');
    lineEl.className='line '+item.type; lineEl.style.opacity='1';
    terminal.appendChild(lineEl);
    content.scrollTop=content.scrollHeight;
    const cursor=document.createElement('span');
    cursor.className='cursor'; lineEl.appendChild(cursor);
    const speed=item.speed||45;
    for(const char of item.text){
      cursor.before(document.createTextNode(char));
      content.scrollTop=content.scrollHeight;
      await sleep(speed+(Math.random()*speed*.25-speed*.12));
    }
    if(!isLast) cursor.remove();
  }
}
window.addEventListener('load', runScript);
</script>
</body>
</html>
