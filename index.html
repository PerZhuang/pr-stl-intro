<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR AI-STL 小组介绍</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { overflow: hidden; }
  body {
    background: #000;
    color: #00ff41;
    font-family: 'JetBrains Mono', 'Noto Sans SC', 'Courier New', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  /* canvas layers */
  #matrix-canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; }
  #fx-canvas     { position:fixed; top:0; left:0; width:100%; height:100%; z-index:8; pointer-events:none; }

  /* scanline sweep */
  #scanline {
    position:fixed; top:-3px; left:0; width:100%; height:3px;
    background:linear-gradient(90deg,transparent 0%,rgba(80,220,100,.08) 10%,
      rgba(80,220,100,.38) 50%,rgba(80,220,100,.08) 90%,transparent 100%);
    box-shadow:0 0 12px rgba(80,220,100,.3),0 0 28px rgba(40,180,60,.15);
    z-index:25; pointer-events:none; animation:scanDown 9s linear infinite;
  }
  @keyframes scanDown {
    0%{top:-3px;opacity:0} 4%{opacity:1} 96%{opacity:.8} 100%{top:100vh;opacity:0}
  }
  body::after {
    content:''; position:fixed; top:0; left:0; width:100%; height:100%;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,
      rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);
    z-index:30; pointer-events:none;
  }

  /* ── Joi character ── */
  #joi-img {
    position: fixed;
    /*
      图片原始 2000×1124，height:100vh width:auto → 渲染约1028×578px
      手指在原图 x≈55%, y≈58% → 屏幕坐标约 43.7vw, 57.8vh
      手指自然指向右侧文字区域
    */
    top: 0;
    left: 0;
    height: 100vh;
    width: 45vw;
    object-fit: cover;
    object-position: center center;
    mix-blend-mode: screen;
    opacity: .92;
    filter: saturate(1.12) brightness(1.02);
    z-index: 12;
    pointer-events: none;
    animation: spaceFloat 12s ease-in-out infinite;
    transition: transform 0.15s ease-out;
    /*
      手指在元素内约568px处，mask从598px开始渐隐到718px消失。
      上下边缘也渐隐（用百分比，因为高度=100vh是固定的）
    */
    /* 图片宽1028px，left:-130px，人物右边缘约898px，mask从700px开始渐隐 */
    -webkit-mask-image:
      linear-gradient(to right, transparent 0, black 3vw, black 32vw, rgba(0,0,0,.6) 38vw, rgba(0,0,0,.2) 44vw, transparent 48vw),
      linear-gradient(to bottom, transparent 0%, black 4%, black 94%, transparent 100%);
    -webkit-mask-composite: source-in;
    mask-image:
      linear-gradient(to right, transparent 0, black 3vw, black 32vw, rgba(0,0,0,.6) 38vw, rgba(0,0,0,.2) 44vw, transparent 48vw),
      linear-gradient(to bottom, transparent 0%, black 4%, black 94%, transparent 100%);
    mask-composite: intersect;
  }
  @keyframes joiFloat {
    0%,100% { transform: translateY(0px) scale(1); }
    50%     { transform: translateY(-7px) scale(1.006); }
  }

  /* ── Fingertip glow — follows active line ── */
  #fingertip {
    position: fixed;
    left: 43vw;   /* 2001图：图片45vw宽，光束从右边缘发出 */
    top: 50vh;
    width: 0; height: 0;
    z-index: 16;
    pointer-events: none;
    transition: top .45s cubic-bezier(.25,.46,.45,.94);
  }
  #fingertip::before {
    content: '';
    position: absolute;
    width: 92px; height: 60px;
    transform: translate(-50%, -50%) rotate(-15deg);
    background: url("naboo.png") no-repeat center/contain;
    filter: drop-shadow(0 0 6px rgba(255,200,80,.8))
            drop-shadow(0 0 18px rgba(200,150,50,.5));
    animation: ftShip 2.4s ease-in-out infinite;
  }
  @keyframes ftShip {
    0%,100%{ transform:translate(-50%,-50%) rotate(-15deg) scale(1);    filter:drop-shadow(0 0 6px rgba(255,200,80,.8)) drop-shadow(0 0 18px rgba(200,150,50,.5)); }
    50%    { transform:translate(-50%,-50%) rotate(-15deg) scale(1.1);   filter:drop-shadow(0 0 10px rgba(255,220,100,1)) drop-shadow(0 0 28px rgba(220,170,60,.8)); }
  }
  /* 飞船尾焰扩散环 */
  #fingertip::after {
    content: '';
    position: absolute;
    width: 24px; height: 24px;
    transform: translate(-50%, -50%) scale(1);
    border: 1.5px solid rgba(100,200,255,.6);
    border-radius: 50%;
    animation: ftRing 2s ease-out infinite;
  }
  @keyframes ftRing {
    0%  { transform:translate(-50%,-50%) scale(1);   opacity:.6; }
    100%{ transform:translate(-50%,-50%) scale(3.5); opacity:0;  }
  }

  /* ── Content ── */
  #content {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: flex-start; align-items: center;
    padding: 55px 0px 55px 47vw;  /* 文字区从47vw开始，图片45vw右侧 */
    overflow-y: hidden; overflow-x: hidden;
    perspective: 900px;
    clip-path: inset(0 0 0 0);
  }
  .terminal-block {
    width: 100%; max-width: 780px;
    display: flex; flex-direction: column; align-items: center;
    transform: rotateY(-10deg);
    transform-origin: left center;
  }

  /* ── Lines ── */
  .line {
    font-size: 23px; line-height: 1.85; color: #00ff41;
    white-space: normal; opacity: 0;
    text-shadow: 0 0 8px #00ff41;
    min-height: 1.85em; text-align: center; width: 100%;
    overflow: visible;
  }
  .line.prompt   { color:#00aa22; font-size:19px; text-align:left; }
  .line.highlight{ color:#aaffaa; font-size:27px; font-weight:bold;
    text-shadow:0 0 16px #00ff41,0 0 32px #00ff41; text-align:center; }
  .line.dim      { color:#005510; font-size:17px; letter-spacing:2px; text-align:center; }
  .line.section  { color:#00dd33; font-size:17px; font-style:italic;
    text-align:center; text-shadow:0 0 10px #00ff41; }
  .line.case     { color:#00ee44; font-size:18px; text-align:left; padding-left:10px;
    white-space: normal; }
  .line.ending   { color:#00ff41; font-size:27px; font-weight:bold;
    text-shadow:0 0 20px #00ff41,0 0 40px #00ff41; text-align:center; }
  .line.status   { color:#00ff41; font-size:19px; text-align:center;
    letter-spacing:3px; text-shadow:0 0 12px #00ff41; }

  /* touch-appear: pink flash when a line is "touched" into existence */
  @keyframes touchAppear {
    0%  { text-shadow: -2px 0 rgba(255,80,180,.9), 2px 0 rgba(255,200,230,.9),
                       0 0 22px rgba(255,100,190,.8), 0 0 8px #00ff41; }
    60% { text-shadow: 0 0 12px #00ff41; }
    100%{ text-shadow: 0 0 8px #00ff41; }
  }
  .line.touch-appear { animation: touchAppear .55s ease-out forwards; }

  /* rgb glitch on click */
  @keyframes rgbGlitch {
    0%,100%{ text-shadow:0 0 8px #00ff41; transform:none; }
    15%{ text-shadow:-3px 0 rgba(255,0,120,.85),3px 0 rgba(0,180,255,.85),0 0 8px #00ff41;
         transform:translate(2px,0); }
    35%{ text-shadow:3px 0 rgba(255,0,120,.6),-2px 0 rgba(0,180,255,.6),0 0 8px #00ff41;
         transform:translate(-2px,0); }
    55%{ text-shadow:-1px 0 rgba(255,0,120,.4),0 0 8px #00ff41; transform:translate(1px,0); }
    80%{ text-shadow:0 0 8px #00ff41; transform:none; }
  }
  .line.glitch-anim { animation: rgbGlitch .2s steps(3) 2; }

  .cursor {
    display:inline-block; width:16px; height:28px; background:#00ff41;
    vertical-align:middle; animation:blink .7s step-end infinite;
    box-shadow:0 0 8px #00ff41;
  }
  @keyframes blink { 50%{ opacity:0 } }

  /* ══ BOOT SCREEN ══ */
  #boot-screen {
    position: fixed;
    inset: 0;
    /* 深绿色网格纹理背景，对标参考图 */
    background: #0a130a;
    background-image:
      linear-gradient(rgba(0,255,65,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,65,.04) 1px, transparent 1px);
    background-size: 32px 32px;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', 'Noto Sans SC', monospace;
  }
  /* CRT scanline overlay */
  #boot-screen::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,.18) 3px, rgba(0,0,0,.18) 4px
    );
    pointer-events: none; z-index: 1;
  }
  /* 外层边框容器 */
  #boot-frame {
    position: relative; z-index: 2;
    width: min(760px, 90vw);
    border: 1px solid rgba(0,255,65,.35);
    border-radius: 8px;
    padding: 48px 52px 40px;
    background: rgba(0,10,2,.82);
    box-shadow: 0 0 0 1px rgba(0,255,65,.08), inset 0 0 60px rgba(0,20,5,.6);
  }
  /* 标题 */
  #boot-title {
    text-align: center;
    font-size: clamp(20px, 3.2vw, 32px);
    font-weight: bold;
    letter-spacing: .22em;
    color: #00ff88;
    text-shadow: 0 0 16px rgba(0,255,100,.7);
    margin-bottom: 36px;
    line-height: 1;
  }
  #boot-cursor {
    display: inline-block;
    width: .65em; height: 1em;
    background: #00ff88;
    vertical-align: middle;
    margin-left: 3px;
    animation: bcBlink .75s step-end infinite;
    box-shadow: 0 0 8px #00ff88;
  }
  @keyframes bcBlink { 50%{ opacity:0 } }

  /* 闪电图标 */
  #boot-icon {
    text-align: center;
    font-size: 48px;
    margin-bottom: 28px;
    line-height: 1;
    filter: drop-shadow(0 0 12px rgba(255,160,60,.7));
    animation: iconPulse 1.8s ease-in-out infinite;
  }
  @keyframes iconPulse {
    0%,100%{ transform:scale(1);   filter:drop-shadow(0 0 10px rgba(255,160,60,.65)); }
    50%    { transform:scale(1.08);filter:drop-shadow(0 0 22px rgba(255,180,60,.9)); }
  }

  /* 进度条区域 */
  #boot-bar-wrap {
    margin-bottom: 6px;
  }
  #boot-bar-track {
    width: 100%;
    height: 12px;
    background: #000;
    border: 1px solid rgba(255,255,255,.25);
    border-radius: 1px;
    overflow: hidden;
    position: relative;
  }
  #boot-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #006622 0%, #00dd55 60%, #00ff88 100%);
    transition: width .09s linear;
    position: relative;
  }
  #boot-bar-fill::after {
    content: '';
    position: absolute; top:0; right:0;
    width: 50px; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.4));
    animation: shimmer .5s linear infinite;
  }
  @keyframes shimmer { from{opacity:.4} 50%{opacity:1} to{opacity:.4} }
  #boot-bar-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 5px;
    font-size: 11px;
    letter-spacing: .12em;
    color: #00aa44;
  }
  #boot-pct { color: #00ff66; font-weight: bold; }

  /* 当前状态文字 */
  #boot-status {
    text-align: center;
    font-size: clamp(12px, 1.8vw, 15px);
    color: #00ff55;
    letter-spacing: .08em;
    margin: 22px 0 20px;
    min-height: 1.4em;
    text-shadow: 0 0 10px rgba(0,255,80,.5);
  }
  #boot-status-cursor {
    display: inline-block;
    width: 8px; height: 14px;
    background: #00ff55;
    vertical-align: middle;
    margin-left: 2px;
    animation: bcBlink .75s step-end infinite;
  }

  /* 底部提示框 */
  #boot-tip {
    border: 1px solid rgba(0,255,65,.3);
    border-radius: 3px;
    padding: 11px 18px;
    font-size: clamp(10px, 1.4vw, 12px);
    color: #00cc44;
    letter-spacing: .06em;
    line-height: 1.5;
    text-align: center;
    background: rgba(0,30,8,.5);
    min-height: 2.5em;
    transition: opacity .3s;
  }

  @keyframes bootFlash {
    0%  { opacity:1; }
    20% { opacity:0; background:#061206; }
    50% { opacity:1; }
    75% { opacity:.5; }
    100%{ opacity:1; }
  }

  /* ── 太空漂浮 ── */
  @keyframes spaceFloat {
    0%,100% { transform: translateY(0px) scale(1); }
    30%      { transform: translateY(-12px) scale(1.008); }
    70%      { transform: translateY(8px) scale(0.995); }
  }

  /* ── 扫描线覆层 ── */
  #scan-line {
    position: fixed; top: 0; left: 0;
    width: 45vw; height: 3px;
    background: linear-gradient(to bottom, transparent, rgba(100,200,255,0.35), transparent);
    z-index: 13; pointer-events: none;
    animation: scanDown 6s linear infinite;
    box-shadow: 0 0 8px rgba(100,200,255,0.4);
  }
  @keyframes scanDown {
    0%   { top: -4px; opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    100% { top: 100vh; opacity: 0; }
  }

  /* ── glitch ── */
  @keyframes glitchShift {
    0%,100% { clip-path: inset(0 0 100% 0); transform: translate(0); }
    10%     { clip-path: inset(15% 0 60% 0); transform: translate(-4px, 2px); }
    20%     { clip-path: inset(40% 0 30% 0); transform: translate(4px, -2px); }
    30%     { clip-path: inset(70% 0 5%  0); transform: translate(-2px, 1px); }
    40%,90% { clip-path: inset(0 0 100% 0); transform: translate(0); }
  }
  #joi-glitch {
    position: fixed; top: 0; left: 0;
    width: 45vw; height: 100vh;
    object-fit: cover; object-position: center center;
    z-index: 14; pointer-events: none;
    opacity: 0;
    filter: hue-rotate(180deg) saturate(3) brightness(1.5);
  }
  #joi-glitch.active {
    opacity: 0.7;
    animation: glitchShift 0.18s steps(1) forwards;
  }
</style>
</head>

<!-- ══ BGM ══ -->
<audio id="audio-bgm" preload="auto" loop><source src="audio/bgm.mp3" type="audio/mpeg"></audio>

<!-- ══ AUDIO UNLOCK OVERLAY ══ -->
<div id="unlock-overlay" style="
  position:fixed;inset:0;z-index:99999;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,1);cursor:pointer;
  flex-direction:column;gap:18px;
">
  <div style="font-family:'JetBrains Mono','Noto Sans SC',monospace;color:#00ff41;font-size:clamp(16px,2.5vw,22px);
    text-shadow:0 0 12px #00ff41;letter-spacing:.12em;text-align:center;">
    ▶ &nbsp;CLICK TO INITIALIZE
  </div>
  <div style="font-family:'JetBrains Mono','Noto Sans SC',monospace;color:#00aa33;font-size:clamp(11px,1.4vw,14px);
    letter-spacing:.08em;">
    // PR AI-STL SYSTEM LOADING...
  </div>
</div>
<script>
  window._audioUnlocked = false;
  document.getElementById('unlock-overlay').addEventListener('click', function() {
    window._audioUnlocked = true;
    this.style.display = 'none';
    document.body.style.cursor = 'none';  // 隐藏鼠标，配合录制
    // 预热所有 audio 元素（解锁浏览器自动播放限制）
    ['a','b','c','d','e'].forEach(id => {
      const a = document.getElementById('audio-' + id);
      if (a) { a.play().then(() => a.pause()).catch(() => {}); }
    });
    // 点击后启动所有动画
    window._matrixInterval = setInterval(drawMatrix, 40);
    requestAnimationFrame(fxLoop);
    // BGM 淡入
    const bgm = document.getElementById('audio-bgm');
    if (bgm) {
      window._bgm = bgm;
      bgm.volume = 0.01;
      bgm.play().then(() => {
        let vol = 0.01;
        const fadeIn = setInterval(() => {
          vol = Math.min(0.30, vol + 0.01);
          bgm.volume = vol;
          if (vol >= 0.30) clearInterval(fadeIn);
        }, 150);
      }).catch(e => { console.warn('BGM play failed:', e); });
    }
    runBoot();
  }, {once: true});
</script>

<script>
// ════════════════════════════════════════
// 1. MATRIX RAIN
// ════════════════════════════════════════
const matCanvas = document.getElementById('matrix-canvas');
const mctx = matCanvas.getContext('2d');
matCanvas.width = window.innerWidth; matCanvas.height = window.innerHeight;
const CHARS = '\u7684\u4e86\u662f\u5728\u548c\u6709\u5927\u8fd9\u56fd\u7ecf\u8981\u4eba\u5b9e\u73b0\u6570\u636e\u7b97\u6cd5\u5206\u6790\u8206\u60c5\u5185\u5bb9\u4f20\u64ad\u8fd0\u884c\u667a\u80fd\u534f\u4f5c01\u30a2\u30a4\u30a6\u30ab\u03a9\u2211\u03bb\u2592\u2593';
const FS = 17, COLS = Math.floor(matCanvas.width / FS);
const streams = Array.from({length: COLS}, () => ({
  y: Math.random() * matCanvas.height / FS,
  speed: .35 + Math.random() * .9,
  hue: Math.random() < .07 ? (Math.random() < .5 ? 'orange' : 'blue') : 'green',
  bright: Math.random() > .82
}));
let burstCol = -1;
setInterval(() => { burstCol = Math.floor(Math.random() * COLS); }, 1100);
function drawMatrix() {
  mctx.fillStyle = 'rgba(0,0,0,0.05)';
  mctx.fillRect(0, 0, matCanvas.width, matCanvas.height);
  mctx.font = FS + 'px monospace';
  streams.forEach((s, i) => {
    const ch = CHARS[Math.floor(Math.random() * CHARS.length)], burst = i === burstCol;
    let color, alpha;
    if (s.hue==='orange')    { color='#ff8c42'; alpha=burst?.55:(s.bright?.32:.19); }
    else if (s.hue==='blue') { color='#44aaff'; alpha=burst?.50:(s.bright?.28:.17); }
    else                     { color='#00ff41'; alpha=burst?.60:(s.bright?.26:.17); }
    mctx.globalAlpha=alpha; mctx.fillStyle=color;
    mctx.fillText(ch, i*FS, s.y*FS); mctx.globalAlpha=1;
    s.y += s.speed;
    if (s.y*FS > matCanvas.height && Math.random() > .975) {
      s.y=0;
      s.hue = Math.random()<.07 ? (Math.random()<.5 ? 'orange' : 'blue') : 'green';
      s.bright = Math.random() > .82;
    }
  });
}
// matrix 等点击后启动，见 unlock handler
window._matrixInterval = null;

// ════════════════════════════════════════
// 2. FX CANVAS — ripples, particles, beam
// ════════════════════════════════════════
const fxCanvas = document.getElementById('fx-canvas');
const fx = fxCanvas.getContext('2d');
fxCanvas.width = window.innerWidth; fxCanvas.height = window.innerHeight;
const ripples = [], particles = [];

class Ripple {
  constructor(x, y, colorStr) {
    this.x=x; this.y=y; this.life=1;
    this.rings=[
      {r:0, speed:4.2, rgba: colorStr || '255,140,60',  lw:2},
      {r:0, speed:2.5, rgba:'200,80,255', lw:1.4},
      {r:0, speed:1.4, rgba:'0,255,100',  lw:1},
    ];
  }
  update(){ this.life-=.016; this.rings.forEach(r=>r.r+=r.speed); }
  draw(){
    this.rings.forEach(ring=>{
      const a=this.life*Math.max(0,1-ring.r/200); if(a<=0) return;
      fx.beginPath(); fx.arc(this.x,this.y,ring.r,0,Math.PI*2);
      fx.strokeStyle=`rgba(${ring.rgba},${a.toFixed(3)})`; fx.lineWidth=ring.lw;
      fx.shadowBlur=10; fx.shadowColor=`rgba(${ring.rgba},.5)`; fx.stroke(); fx.shadowBlur=0;
    });
  }
  get dead(){ return this.life<=0; }
}
class Particle {
  constructor(x, y, colorBias) {
    const a=Math.random()*Math.PI*2, s=1.5+Math.random()*4;
    this.x=x; this.y=y; this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
    this.life=.75+Math.random()*.4; this.size=1+Math.random()*2.5;
    this.color = colorBias==='pink'
      ? (Math.random()<.6 ? '#ff88cc' : '#cc44ff')
      : (Math.random()<.45 ? '#ff66cc' : (Math.random()<.7 ? '#aa44ff' : '#00ff88'));
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.vy+=.06; this.vx*=.98; this.life-=.022; this.size*=.975; }
  draw(){
    fx.save(); fx.globalAlpha=Math.max(0,this.life);
    fx.shadowBlur=8; fx.shadowColor=this.color; fx.fillStyle=this.color;
    fx.beginPath(); fx.arc(this.x,this.y,Math.max(0,this.size),0,Math.PI*2); fx.fill(); fx.restore();
  }
  get dead(){ return this.life<=0||this.size<.1; }
}

// ── TOUCH BEAM — drawn each frame ──
let beamY = window.innerHeight * .5;    // current (animated) beam Y
let beamTargetY = window.innerHeight * .5;
const BEAM_X = window.innerWidth * .43;  // fingertip X = 43vw
const TEXT_X  = window.innerWidth * .48; // beam延伸到文字区起始

function drawBeam() {
  beamY += (beamTargetY - beamY) * .06;

  // update CSS fingertip element
  document.getElementById('fingertip').style.top = beamY + 'px';

  const len = TEXT_X - BEAM_X;
  if (len <= 0) return;

  // horizontal beam (left 80% of beam, from fingertip toward text)
  const grad = fx.createLinearGradient(BEAM_X, beamY, BEAM_X + len, beamY);
  grad.addColorStop(0, 'rgba(255,120,200,.75)');
  grad.addColorStop(.5, 'rgba(255,80,180,.35)');
  grad.addColorStop(1, 'rgba(255,80,180,0)');
  fx.beginPath();
  fx.moveTo(BEAM_X, beamY);
  fx.lineTo(BEAM_X + len, beamY);
  fx.strokeStyle = grad;
  fx.lineWidth = 1.5;
  fx.shadowBlur = 8;
  fx.shadowColor = 'rgba(255,100,200,.6)';
  fx.stroke();
  fx.shadowBlur = 0;
}

function fxLoop() {
  fx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
  drawBeam();
  for(let i=ripples.length-1;i>=0;i--){ ripples[i].update(); ripples[i].draw(); if(ripples[i].dead) ripples.splice(i,1); }
  for(let i=particles.length-1;i>=0;i--){ particles[i].update(); particles[i].draw(); if(particles[i].dead) particles.splice(i,1); }
  requestAnimationFrame(fxLoop);
}

// ════════════════════════════════════════
// 3. TOUCH POINT — aim at active line
// ════════════════════════════════════════
function aimAt(lineEl) {
  setTimeout(() => {
    const r = lineEl.getBoundingClientRect();
    if (r.height > 0) {
      beamTargetY = r.top + r.height / 2;
      // spawn a small pink ripple at the fingertip + a few particles (the "touch")
      ripples.push(new Ripple(BEAM_X, beamTargetY, '255,120,200'));
      for (let k = 0; k < 8; k++) particles.push(new Particle(BEAM_X, beamTargetY, 'pink'));
    }
  }, 60);
}

// ════════════════════════════════════════
// 4. CLICK INTERACTION
// ════════════════════════════════════════
document.addEventListener('click', e => {
  ripples.push(new Ripple(e.clientX, e.clientY));
  for (let i=0; i<20; i++) particles.push(new Particle(e.clientX, e.clientY));
  document.querySelectorAll('.line').forEach(el => {
    const r = el.getBoundingClientRect();
    if (Math.abs((r.top+r.bottom)/2 - e.clientY) < 120) {
      el.classList.add('glitch-anim');
      el.addEventListener('animationend', () => el.classList.remove('glitch-anim'), {once:true});
    }
  });
});

// 5. PERIODIC GLITCH
// ════════════════════════════════════════
(function autoGlitch() {
  const vis = Array.from(document.querySelectorAll('.line')).filter(el=>parseFloat(el.style.opacity)>0);
  if (vis.length) {
    const t = vis[Math.floor(Math.random()*vis.length)];
    t.classList.add('glitch-anim');
    t.addEventListener('animationend', ()=>t.classList.remove('glitch-anim'), {once:true});
  }
  setTimeout(autoGlitch, 3000 + Math.random()*4500);
})();

async function sleep(ms){ return new Promise(r => setTimeout(r,ms)); }

async function runScript() {
  await sleep(150);
  for (let i=0; i<script.length; i++) {
    const item=script[i], isLast=(i===script.length-1);
    if (item.delay) await sleep(item.delay);

    if (item.type==='blank') {
      const b=document.createElement('div');
      b.className='line dim'; b.style.opacity='1'; b.style.minHeight='1em';
      terminal.appendChild(b);
      content.scrollTop=content.scrollHeight;
      await sleep(160); continue;
    }

    const lineEl=document.createElement('div');
    lineEl.className='line '+item.type; lineEl.style.opacity='1';
    terminal.appendChild(lineEl);
    content.scrollTop=content.scrollHeight;

    // ── audio segment trigger ──
    // 等待上一段音频结束
    if (item.waitAudio && window._currentAudio) {
      const a = window._currentAudio;
      if (!a.ended && !a.paused && window._audioUnlocked) {
        await new Promise(resolve => {
          a.addEventListener('ended', resolve, {once: true});
          setTimeout(resolve, 15000);
        });
      }
    }
    // 等待音频播放到指定时间点
    if (item.waitUntil && window._currentAudio && window._audioUnlocked) {
      const a = window._currentAudio;
      await new Promise(resolve => {
        const check = () => {
          if (a.ended || a.currentTime >= item.waitUntil) { resolve(); return; }
          setTimeout(check, 50);
        };
        setTimeout(resolve, 20000); // 最多等20s
        check();
      });
    }
    if (item.audioId && window._audioUnlocked) {
      const seg = document.getElementById('audio-' + item.audioId);
      if (seg) {
        seg.currentTime = 0;
        // 语音播放时压低 BGM
        if (window._bgm) window._bgm.volume = 0.08;
        seg.play().then(() => {
          window._currentAudio = seg;
        }).catch(() => {});
        // 语音结束后恢复 BGM
        seg.addEventListener('ended', () => {
          if (window._bgm) {
            let v = window._bgm.volume;
            const restore = setInterval(() => {
              v = Math.min(0.20, v + 0.01);
              window._bgm.volume = v;
              if (v >= 0.20) clearInterval(restore);
            }, 100);
          }
        }, { once: true });
      }
    }
    // ── touch interaction: aim beam + ripple + pink appear flash ──
    aimAt(lineEl);
    lineEl.classList.add('touch-appear');
    lineEl.addEventListener('animationend', ()=>lineEl.classList.remove('touch-appear'), {once:true});

    const cursor=document.createElement('span');
    cursor.className='cursor'; lineEl.appendChild(cursor);

    const speed=item.speed||45;
    for (const char of item.text) {
      cursor.before(document.createTextNode(char));
      content.scrollTop=content.scrollHeight;
      await sleep(speed+(Math.random()*speed*.25-speed*.12));
    }
    if (!isLast) cursor.remove();
  }
}

// 8. BOOT SCREEN
// ════════════════════════════════════════
async function runBoot() {
  const boot   = document.getElementById('boot-screen');
  const bar    = document.getElementById('boot-bar-fill');
  const pct    = document.getElementById('boot-pct');
  const status = document.getElementById('boot-status');
  const tip    = document.getElementById('boot-tip');

  // Status messages that cycle during loading
  const steps = [
    { pct:  6, msg: 'Checking system requirements...' },
    { pct: 14, msg: 'Loading AI core modules...' },
    { pct: 24, msg: 'Initializing PR workflows...' },
    { pct: 35, msg: 'Connecting STL agent network...' },
    { pct: 47, msg: 'Calibrating content engine...' },
    { pct: 58, msg: 'Loading matrix renderer...' },
    { pct: 68, msg: 'Establishing secure channel...' },
    { pct: 78, msg: 'Syncing team knowledge base...' },
    { pct: 88, msg: 'Compiling interface layer...' },
    { pct: 96, msg: 'All systems nominal...' },
    { pct:100, msg: '✓  READY' },
  ];

  const tips = [
    'Did you know? AI is transforming how PR teams work — one workflow at a time.',
    'Tip: Claude Code can write, debug and iterate — autonomously.',
    'PR × AI-STL: where content meets code.',
    'Non-technical? AI-STL bridges the gap between ideas and execution.',
    '当中文成为新的编程语言，这是我们的机会。',
  ];

  let tipIdx = 0;
  const tipTimer = setInterval(() => {
    tip.style.opacity = '0';
    setTimeout(() => {
      tipIdx = (tipIdx + 1) % tips.length;
      tip.textContent = tips[tipIdx];
      tip.style.opacity = '1';
    }, 300);
  }, 1000);

  const TOTAL = 1200;
  const start = Date.now();
  let stepIdx = 0;

  await new Promise(resolve => {
    function tick() {
      const elapsed = Date.now() - start;
      const p = Math.min(100, Math.round(elapsed / TOTAL * 100));
      bar.style.width = p + '%';
      pct.textContent = p + '%';

      // Advance status message
      if (stepIdx < steps.length && p >= steps[stepIdx].pct) {
        const sc = document.getElementById('boot-status-cursor');
        status.textContent = steps[stepIdx].msg;
        if (sc) status.appendChild(sc);
        stepIdx++;
      }

      if (p < 100) {
        requestAnimationFrame(tick);
      } else {
        resolve();
      }
    }
    requestAnimationFrame(tick);
  });

  clearInterval(tipTimer);
  await sleep(300);

  // Flash + slide out
  boot.style.animation = 'bootFlash 0.25s ease-out forwards';
  await sleep(200);
  boot.style.transition = 'transform 0.4s cubic-bezier(0.7,0,1,1), opacity 0.4s ease';
  boot.style.transform = 'translateY(-100%)';
  boot.style.opacity = '0';
  await sleep(400);
  boot.style.display = 'none';

  runScript();
}
