<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR AI-STL 小组介绍</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #00ff41;
    font-family: 'Courier New', 'SimHei', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  /* ── Canvas layers ── */
  #matrix-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  #fx-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 8;
    pointer-events: none;
  }

  /* ── Scanline sweep (Blade Runner amber) ── */
  #scanline {
    position: fixed;
    top: -3px;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(255,140,60,0.15) 10%,
      rgba(255,140,60,0.85) 50%,
      rgba(255,140,60,0.15) 90%,
      transparent 100%);
    box-shadow: 0 0 18px rgba(255,140,60,0.7), 0 0 40px rgba(255,100,20,0.3);
    z-index: 25;
    pointer-events: none;
    animation: scanDown 9s linear infinite;
  }
  @keyframes scanDown {
    0%   { top: -3px;   opacity: 0; }
    4%   { opacity: 1; }
    96%  { opacity: 0.8; }
    100% { top: 100vh;  opacity: 0; }
  }

  /* ── CRT scanlines overlay ── */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.06) 2px,
      rgba(0,0,0,0.06) 4px
    );
    z-index: 30;
    pointer-events: none;
  }

  /* ── Android hand ── */
  #android-hand {
    position: fixed;
    bottom: -50px;
    right: -45px;
    width: 270px;
    height: 510px;
    z-index: 20;
    pointer-events: none;
    opacity: 0.88;
    transform-origin: 78% 92%;
    animation: handFloat 5s ease-in-out infinite;
    filter: drop-shadow(0 0 10px rgba(255,140,60,0.5))
            drop-shadow(0 0 28px rgba(255,100,20,0.25));
  }
  @keyframes handFloat {
    0%,100% { transform: translate(0,0) rotate(-6deg); }
    50%     { transform: translate(-10px,-14px) rotate(-4deg); }
  }
  #android-hand.fired {
    animation: handFire 0.55s ease-out forwards;
  }
  @keyframes handFire {
    0%  { transform: translate(0,0) rotate(-6deg);
          filter: drop-shadow(0 0 10px rgba(255,140,60,0.5)); }
    40% { transform: translate(-25px,-38px) rotate(0deg) scale(1.04);
          filter: drop-shadow(0 0 30px rgba(255,140,60,1))
                  drop-shadow(0 0 60px rgba(80,180,255,0.5)); }
    100%{ transform: translate(-18px,-26px) rotate(-2deg);
          filter: drop-shadow(0 0 14px rgba(255,140,60,0.6)); }
  }

  /* ── Content ── */
  #content {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding: 60px 80px;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .terminal-block {
    width: 100%;
    max-width: 1200px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Line styles (original preserved) ── */
  .line {
    font-size: 30px;
    line-height: 1.85;
    color: #00ff41;
    white-space: pre;
    opacity: 0;
    text-shadow: 0 0 8px #00ff41;
    min-height: 1.85em;
    text-align: center;
    width: 100%;
    transition: text-shadow 0.1s;
  }

  .line.prompt {
    color: #00aa22; font-size: 24px; text-align: left;
  }
  .line.highlight {
    color: #aaffaa; font-size: 34px; font-weight: bold;
    text-shadow: 0 0 16px #00ff41, 0 0 32px #00ff41; text-align: center;
  }
  .line.dim {
    color: #005510; font-size: 22px; letter-spacing: 2px; text-align: center;
  }
  .line.section {
    color: #00dd33; font-size: 22px; font-style: italic;
    text-align: center; text-shadow: 0 0 10px #00ff41;
  }
  .line.case {
    color: #00ee44; font-size: 26px; text-align: left; padding-left: 40px;
  }
  .line.ending {
    color: #00ff41; font-size: 36px; font-weight: bold;
    text-shadow: 0 0 20px #00ff41, 0 0 40px #00ff41; text-align: center;
  }
  .line.status {
    color: #00ff41; font-size: 24px; text-align: center;
    letter-spacing: 3px; text-shadow: 0 0 12px #00ff41;
  }

  /* ── RGB-split glitch ── */
  @keyframes rgbGlitch {
    0%   { text-shadow: 0 0 8px #00ff41; transform: none; }
    15%  { text-shadow: -3px 0 rgba(255,0,120,0.85), 3px 0 rgba(0,180,255,0.85), 0 0 8px #00ff41;
           transform: translate(2px,0); }
    30%  { text-shadow: 3px 0 rgba(255,0,120,0.6), -2px 0 rgba(0,180,255,0.6), 0 0 8px #00ff41;
           transform: translate(-2px,0); }
    50%  { text-shadow: -1px 0 rgba(255,0,120,0.4), 1px 0 rgba(0,180,255,0.4), 0 0 8px #00ff41;
           transform: translate(1px,0); }
    75%  { text-shadow: 2px 0 rgba(0,180,255,0.3), 0 0 8px #00ff41;
           transform: translate(0,0); }
    100% { text-shadow: 0 0 8px #00ff41; transform: none; }
  }
  .line.glitch-anim {
    animation: rgbGlitch 0.2s steps(3) 2;
  }

  /* ── Cursor ── */
  .cursor {
    display: inline-block;
    width: 16px; height: 28px;
    background: #00ff41;
    vertical-align: middle;
    animation: blink 0.7s step-end infinite;
    box-shadow: 0 0 8px #00ff41;
  }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>

<div id="content">

<script>
// ══════════════════════════════════════════════════════════════
//  1. MATRIX RAIN  — multi-color depth-aware streams
// ══════════════════════════════════════════════════════════════
const matCanvas = document.getElementById('matrix-canvas');
const mctx      = matCanvas.getContext('2d');
matCanvas.width  = window.innerWidth;
matCanvas.height = window.innerHeight;

const CHARS = '的了是在以和有大这主国经一要人我他为你上来产用工动方业种地发也看什么都会实现数据算法分析报告舆情内容传播运行智能协作01アイウエオカキクケコ∑∂∇λΩ░▒▓';
const FS    = 17;
const COLS  = Math.floor(matCanvas.width / FS);

// Each stream: position, speed, color-type, brightness
const streams = Array.from({length: COLS}, () => ({
  y:      Math.random() * (matCanvas.height / FS),
  speed:  0.35 + Math.random() * 0.9,
  hue:    Math.random() < 0.07 ? (Math.random() < 0.5 ? 'orange' : 'blue') : 'green',
  bright: Math.random() > 0.82,
  skip:   Math.random() > 0.88           // some columns start paused
}));

// Occasional "burst" column — full-bright for one frame
let burstCol = -1;
setInterval(() => { burstCol = Math.floor(Math.random() * COLS); }, 1200);

function drawMatrix() {
  mctx.fillStyle = 'rgba(0,0,0,0.05)';
  mctx.fillRect(0, 0, matCanvas.width, matCanvas.height);
  mctx.font = FS + 'px monospace';

  streams.forEach((s, i) => {
    const char = CHARS[Math.floor(Math.random() * CHARS.length)];
    const isBurst = (i === burstCol);

    let color, alpha;
    if (s.hue === 'orange') { color = '#ff8c42'; alpha = isBurst ? 0.55 : (s.bright ? 0.32 : 0.19); }
    else if (s.hue === 'blue') { color = '#44aaff'; alpha = isBurst ? 0.50 : (s.bright ? 0.28 : 0.17); }
    else                       { color = '#00ff41'; alpha = isBurst ? 0.60 : (s.bright ? 0.26 : 0.17); }

    mctx.globalAlpha = alpha;
    mctx.fillStyle   = color;
    mctx.fillText(char, i * FS, s.y * FS);
    mctx.globalAlpha = 1;

    if (!s.skip) s.y += s.speed;
    if (s.y * FS > matCanvas.height && Math.random() > 0.975) {
      s.y      = 0;
      s.hue    = Math.random() < 0.07 ? (Math.random() < 0.5 ? 'orange' : 'blue') : 'green';
      s.bright = Math.random() > 0.82;
      s.skip   = false;
    }
    // Occasionally pause a stream (simulates dropped frames)
    if (Math.random() > 0.9985) s.skip = !s.skip;
  });
}
setInterval(drawMatrix, 40);

// ══════════════════════════════════════════════════════════════
//  2. FX CANVAS  — click ripples & particles
// ══════════════════════════════════════════════════════════════
const fxCanvas = document.getElementById('fx-canvas');
const fx       = fxCanvas.getContext('2d');
fxCanvas.width  = window.innerWidth;
fxCanvas.height = window.innerHeight;

const ripples   = [];
const particles = [];

class Ripple {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.life = 1;
    // Three concentric rings with different speeds & colors
    this.rings = [
      { r: 0, speed: 4.2, rgba: '255,140,60',  lw: 2.0 },
      { r: 0, speed: 2.5, rgba: '80,160,255',  lw: 1.4 },
      { r: 0, speed: 1.4, rgba: '0,255,100',   lw: 1.0 },
    ];
  }
  update() {
    this.life -= 0.016;
    this.rings.forEach(r => { r.r += r.speed; });
  }
  draw() {
    this.rings.forEach(ring => {
      const a = this.life * Math.max(0, 1 - ring.r / 220);
      if (a <= 0) return;
      fx.beginPath();
      fx.arc(this.x, this.y, ring.r, 0, Math.PI * 2);
      fx.strokeStyle = `rgba(${ring.rgba},${a.toFixed(3)})`;
      fx.lineWidth   = ring.lw;
      fx.shadowBlur  = 12;
      fx.shadowColor = `rgba(${ring.rgba},0.5)`;
      fx.stroke();
      fx.shadowBlur  = 0;
    });
  }
  get dead() { return this.life <= 0; }
}

class Particle {
  constructor(x, y) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = 1.8 + Math.random() * 4.5;
    this.x  = x; this.y  = y;
    this.vx = Math.cos(angle) * spd;
    this.vy = Math.sin(angle) * spd;
    this.life = 0.8 + Math.random() * 0.4;
    this.size = 1.2 + Math.random() * 3;
    const r   = Math.random();
    this.color = r < 0.45 ? '#ff8c42' : r < 0.75 ? '#44aaff' : '#00ff88';
  }
  update() {
    this.x   += this.vx;
    this.y   += this.vy;
    this.vy  += 0.07;          // gravity
    this.vx  *= 0.98;          // drag
    this.life -= 0.022;
    this.size *= 0.974;
  }
  draw() {
    fx.save();
    fx.globalAlpha = Math.max(0, this.life);
    fx.shadowBlur  = 10;
    fx.shadowColor = this.color;
    fx.fillStyle   = this.color;
    fx.beginPath();
    fx.arc(this.x, this.y, Math.max(0, this.size), 0, Math.PI * 2);
    fx.fill();
    fx.restore();
  }
  get dead() { return this.life <= 0 || this.size < 0.15; }
}

function fxLoop() {
  fx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
  for (let i = ripples.length   - 1; i >= 0; i--) {
    ripples[i].update(); ripples[i].draw();
    if (ripples[i].dead) ripples.splice(i, 1);
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update(); particles[i].draw();
    if (particles[i].dead) particles.splice(i, 1);
  }
  requestAnimationFrame(fxLoop);
}
fxLoop();

// ══════════════════════════════════════════════════════════════
//  3. CLICK INTERACTION
// ══════════════════════════════════════════════════════════════
const hand = document.getElementById('android-hand');

document.addEventListener('click', e => {
  // Spawn ripple + particles
  ripples.push(new Ripple(e.clientX, e.clientY));
  for (let i = 0; i < 22; i++) particles.push(new Particle(e.clientX, e.clientY));

  // Finger reach animation
  hand.classList.remove('fired');
  void hand.offsetWidth;          // force reflow
  hand.classList.add('fired');
  setTimeout(() => {
    hand.classList.remove('fired');
  }, 660);

  // Glitch lines near click
  glitchNearby(e.clientY);
});

function glitchNearby(y) {
  document.querySelectorAll('.line').forEach(el => {
    const rect = el.getBoundingClientRect();
    if (Math.abs((rect.top + rect.bottom) / 2 - y) < 120) {
      el.classList.add('glitch-anim');
      el.addEventListener('animationend',
        () => el.classList.remove('glitch-anim'),
        { once: true }
      );
    }
  });
}

// ══════════════════════════════════════════════════════════════
//  4. PERIODIC AUTO-GLITCH  — random line flicker every ~3s
// ══════════════════════════════════════════════════════════════
function autoGlitch() {
  const visible = Array.from(document.querySelectorAll('.line'))
    .filter(el => parseFloat(el.style.opacity) > 0);
  if (visible.length > 0) {
    const target = visible[Math.floor(Math.random() * visible.length)];
    target.classList.add('glitch-anim');
    target.addEventListener('animationend',
      () => target.classList.remove('glitch-anim'),
      { once: true }
    );
  }
  setTimeout(autoGlitch, 2800 + Math.random() * 4200);
}
setTimeout(autoGlitch, 6000);

// ══════════════════════════════════════════════════════════════
//  5. SCREEN FLICKER  — very subtle ambient intensity pulse
// ══════════════════════════════════════════════════════════════
const matEl = document.getElementById('matrix-canvas');
function flicker() {

const terminal = document.getElementById('terminal');

async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runScript() {
  await sleep(700);
  for (let i = 0; i < script.length; i++) {
    const item   = script[i];
    const isLast = i === script.length - 1;
    if (item.delay) await sleep(item.delay);

    if (item.type === 'blank') {
      const b = document.createElement('div');
      b.className      = 'line dim';
      b.style.opacity  = '1';
      b.style.minHeight = '1em';
      terminal.appendChild(b);
      terminal.scrollTop = terminal.scrollHeight;
      await sleep(160);
      continue;
    }

    const lineEl       = document.createElement('div');
    lineEl.className   = 'line ' + item.type;
    lineEl.style.opacity = '1';
    terminal.appendChild(lineEl);
    terminal.scrollTop = terminal.scrollHeight;

    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    lineEl.appendChild(cursor);

    const speed = item.speed || 45;
    for (const char of item.text) {
      cursor.before(document.createTextNode(char));
      await sleep(speed + (Math.random() * speed * 0.25 - speed * 0.12));
    }
    if (!isLast) cursor.remove();
  }
}

window.addEventListener('load', runScript);
